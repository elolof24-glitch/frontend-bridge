<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bridge Preview</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app">
    <aside class="panel" id="chains-panel">
      <h2>Chains</h2>
      <div id="chains"></div>
    </aside>

    <main class="panel panel-main">
      <h1>Bridge</h1>
      <div class="bridge-box">
        <div class="field">
          <label>From</label>
          <div class="input">Arbitrum</div>
        </div>
        <div class="field">
          <label>To</label>
          <div class="input">Select destination chain</div>
        </div>
        <div class="field">
          <label>Amount</label>
          <div class="input">0.0 USDC</div>
        </div>
      </div>
      <h3>Routes</h3>
      <div id="routes"></div>
    </main>

    <aside class="panel" id="tokens-panel">
      <h2>Tokens</h2>
      <div id="tokens"></div>
    </aside>
  </div>

  <script src="./chains.js"></script>
  <script src="./tokens.js"></script>
  <script src="./routes.js"></script>
  <script src="./app.js"></script>
</body>
</html>
